baseurl: https://jeffrey-ljf.github.io
languageCode: en-us
theme: hugo-theme-stack
title: Example Site
copyright: Jeffrey-刘俊丰
#Example Person

#hugo\dev\content\page 修改左侧主页链接
# Theme i18n support
# Available values: ar, bn, ca, de, el, en, es, fr, hu, id, it, ja, ko, nl, pt-br, th, uk, zh-cn, zh-hk, zh-tw
DefaultContentLanguage: zh-cn

# Set hasCJKLanguage to true if DefaultContentLanguage is in [zh-cn ja ko]
# This will make .Summary and .WordCount behave correctly for CJK languages.
hasCJKLanguage: false

languages:

    en:
        languageName: English
        title: Jeffrey-刘俊丰
        weight: 1
        params:
            description: Example description
    zh-cn:
        languageName: 中文
        title: Jeffrey-刘俊丰
        weight: 2
        params:
            description: Example description


services:
    # Change it to your Disqus shortname before using
    disqus:
        shortname: "hugo-theme-stack"
    # GA Tracking ID
    googleAnalytics:
        id:

pagination:
    pagerSize: 3

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: ./favicon.ico
    # e.g.: favicon placed in `static/favicon.ico` of your site folder, then set this field to `./favicon.ico` (`/` is necessary)

    

    footer:
        since: 2020
        #搭建网站时间
        customText: 希望这一个开始，将是永恒的初心
        #自定义文本

    dateFormat:
        published: 2006-01-2
        #Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji: 🐇
        subtitle:  Hi，欢迎来到我的世界
        #留言
        avatar:
            enabled: true
            local: true
            src: img/avatar.png
            #dev\themes\hugo-theme-stack\assets\img

    article:
        math: true
        toc: true
        #目录
        
        readingTime: true
        license:
            enabled: true
            default: Licensed under CC BY-NC-SA 4.0
            #文章下面@Licensed under CC BY-NC-SA 4.0
    #评论
    comments:
        enabled: false
        provider: utterances

        disqusjs:
            shortname:
            apiUrl:
            apiKey:
            admin:
            adminLabel:

        utterances:
            repo:
            #仓库
            issueTerm: pathname
            label:

        beaudar:
            repo:
            issueTerm: pathname
            label:
            theme:

        remark42:
            host:
            site:
            locale:

        vssue:
            platform:
            owner:
            repo:
            clientId:
            clientSecret:
            autoCreateIssue: false

        # Waline client configuration see: https://waline.js.org/en/reference/component.html
        waline:
            serverURL:
            lang:
            pageview:
            emoji:
                - https://unpkg.com/@waline/emojis@1.0.1/weibo
            requiredMeta:
                - name
                - email
                - url
            locale:
                admin: Admin
                placeholder:

        twikoo:
            envId:
            region:
            path:
            lang:

        # See https://cactus.chat/docs/reference/web-client/#configuration for description of the various options
        cactus:
            defaultHomeserverUrl: "https://matrix.cactus.chat:8448"
            serverName: "cactus.chat"
            siteName: "" # You must insert a unique identifier here matching the one you registered (See https://cactus.chat/docs/getting-started/quick-start/#register-your-site)

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping:
            lightTheme:
            darkTheme:
            reactionsEnabled: 1
            emitMetadata: 0

        gitalk:
            owner:
            admin:
            repo:
            clientID:
            clientSecret:
            proxy:

        cusdis:
            host:
            id:
    #装饰
    #dev\themes\hugo-theme-stack\layouts\partials\widget 新增组件
    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 10
        page:
            - type: toc

    opengraph:
        twitter:
            # Your Twitter username
            site:

            # Available values: summary, summary_large_image
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:
    #主题暗黑 & 亮\hugo\dev\themes\hugo-theme-stack\assets\scss\partials\highlight
    colorScheme:
        # Display toggle
        toggle: true

        # Available values: auto, light, dark
        default: dark

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

    

### Custom menu
### See https://stack.jimmycai.com/config/menu
### To remove about, archive and search page menu item, remove `menu` field from their FrontMatter
menu:
    main: []
    #hugo\dev\themes\hugo-theme-stack\assets\icons 超链接
    social:
        - identifier: github
          name: GitHub
          url: https://github.com/Jeffrey-ljf
          params:
              icon: brand-github

        - identifier: bilibili
          name: bilibili
          url: https://space.bilibili.com/250193290
          params:
              icon: bilibili

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100

        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
        renderer:
            ## Set to true if you have HTML content inside Markdown
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
